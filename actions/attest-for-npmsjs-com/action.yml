name: "[Ledger Security] Attest an npm package for npmjs.com distribution"
description: "Attest an npm package for npmjs.com distribution. Supports pre-packed tarballs or directories with package.json."
inputs:
  subject-path:
    description: 'Path to the npm package to attest. Can be a .tgz file, a directory containing .tgz files (most recent selected), or a directory with a package.json to pack when no .tgz files are present.'
    required: true
  package-manager:
    description: 'Package manager to use for packing when subject-path is a directory with package.json and no .tgz files are present (npm or pnpm). Defaults to npm.'
    required: false
    default: 'npm'

outputs:
  tarball-path:
    description: 'Absolute path to the tarball that was attested.'
    value: ${{ steps.package-details.outputs.TARBALL_PATH }}

runs:
  using: "composite"
  steps:
      - name: Check if repository is public (signature are leaking private information)
        if: ${{ github.event.repository.visibility != 'public' }}
        shell: bash
        run: |
          echo "::error::This action only runs on public repositories. To avoid leaking private information, the action will be stopped."
          exit 1
      # TODO: This restriction can be dropped once npmjs.com accepts attestations from self-hosted runners.
      - name: Check if running on a GitHub-hosted runner
        if: ${{ runner.environment != 'github-hosted' }}
        shell: bash
        run: |
          echo "::error::This action must run on a GitHub-hosted runner. npmjs.com provenance verification rejects attestations generated on self-hosted runners (Runner Environment: \"$RUNNER_ENVIRONMENT\")."
          exit 1
      - name: Set GitHub Path
        run: echo "$GITHUB_ACTION_PATH" >> "$GITHUB_PATH"
        shell: bash
        env:
          GITHUB_ACTION_PATH: ${{ github.action_path }}
      - name: Auto-Detect - Package details
        id: package-details
        shell: bash
        env:
          SUBJECT_PATH: ${{ inputs.subject-path }}
          PACK_MANAGER: ${{ inputs.package-manager }}
        run: |
          set -euo pipefail

          if [ "$PACK_MANAGER" != "npm" ] && [ "$PACK_MANAGER" != "pnpm" ]; then
            echo "::error::Unsupported package manager: $PACK_MANAGER. Use 'npm' or 'pnpm'."
            exit 1
          fi

          if [ ! -e "$SUBJECT_PATH" ]; then
            echo "::error::Provided subject-path does not exist: $SUBJECT_PATH"
            exit 1
          fi

          # Resolve subject-path to absolute for consistent behavior
          SUBJECT_ABS=$(realpath "$SUBJECT_PATH")
          SELECT_NEWEST_TGZ_PATH=""
          SELECT_NEWEST_TGZ_WARNING=""

          select_newest_tgz() {
            local search_dir="$1"
            local -a tgz_files=()
            local newest_file
            local file

            shopt -s nullglob
            tgz_files=("$search_dir"/*.tgz)
            shopt -u nullglob

            if [ "${#tgz_files[@]}" -eq 0 ]; then
              SELECT_NEWEST_TGZ_PATH=""
              SELECT_NEWEST_TGZ_WARNING=""
              return 1
            fi

            newest_file="${tgz_files[0]}"
            for file in "${tgz_files[@]:1}"; do
              if [ "$file" -nt "$newest_file" ]; then
                newest_file="$file"
              fi
            done

            if [ "${#tgz_files[@]}" -gt 1 ]; then
              SELECT_NEWEST_TGZ_WARNING="::warning::Multiple .tgz files found in $search_dir. Using the most recently modified tarball: $(basename "$newest_file")."
            else
              SELECT_NEWEST_TGZ_WARNING=""
            fi

            SELECT_NEWEST_TGZ_PATH="$newest_file"
          }

          # Resolve the tarball path based on what was provided.
          # For directory inputs, existing .tgz files take precedence over packing from package.json.
          if [ -f "$SUBJECT_ABS" ] && [[ "$SUBJECT_ABS" == *.tgz ]]; then
            echo "Using existing tarball: $SUBJECT_ABS"
            PACKAGE_TARBALL="$SUBJECT_ABS"

          elif [ -d "$SUBJECT_ABS" ]; then
            if select_newest_tgz "$SUBJECT_ABS"; then
              PACKAGE_TARBALL="$SELECT_NEWEST_TGZ_PATH"
              if [ -n "$SELECT_NEWEST_TGZ_WARNING" ]; then
                echo "$SELECT_NEWEST_TGZ_WARNING"
              fi
              if [ -f "$SUBJECT_ABS/package.json" ]; then
                echo "::warning::Both .tgz files and package.json were found in $SUBJECT_ABS. Using existing .tgz tarball."
              fi
              echo "Found tarball in directory: $PACKAGE_TARBALL"

            elif [ -f "$SUBJECT_ABS/package.json" ]; then
              echo "Found package.json in $SUBJECT_ABS, packing with $PACK_MANAGER..."
              if ! (cd "$SUBJECT_ABS" && "$PACK_MANAGER" pack); then
                echo "::error::$PACK_MANAGER pack failed in $SUBJECT_ABS"
                exit 1
              fi
              if ! select_newest_tgz "$SUBJECT_ABS"; then
                echo "::error::$PACK_MANAGER pack succeeded but no .tgz file was found in $SUBJECT_ABS"
                exit 1
              fi
              PACKAGE_TARBALL="$SELECT_NEWEST_TGZ_PATH"
              if [ -n "$SELECT_NEWEST_TGZ_WARNING" ]; then
                echo "$SELECT_NEWEST_TGZ_WARNING"
              fi
              echo "Packed tarball: $PACKAGE_TARBALL"
              echo "::warning::When packing from a directory, ensure you use the 'tarball-path' output to publish the exact same tarball that was attested."

            else
              echo "::error::No .tgz file or package.json found at: $SUBJECT_PATH"
              exit 1
            fi

          else
            echo "::error::subject-path must point to a .tgz file, a directory containing .tgz files, or a directory with package.json: $SUBJECT_PATH"
            exit 1
          fi

          # Extract metadata directly from the tarball without re-packing
          if ! PACKAGE_JSON=$(tar xzf "$PACKAGE_TARBALL" -O package/package.json 2>/dev/null); then
            echo "::error::Failed to extract package/package.json from tarball: $PACKAGE_TARBALL"
            exit 1
          fi
          if [ -z "$PACKAGE_JSON" ]; then
            echo "::error::package/package.json was not found or is empty in tarball: $PACKAGE_TARBALL"
            exit 1
          fi

          if ! PACKAGE_NAME=$(jq -er '.name' <<<"$PACKAGE_JSON"); then
            echo "::error::Failed to parse package name from package/package.json in tarball: $PACKAGE_TARBALL"
            exit 1
          fi
          if ! PACKAGE_VERSION=$(jq -er '.version' <<<"$PACKAGE_JSON"); then
            echo "::error::Failed to parse package version from package/package.json in tarball: $PACKAGE_TARBALL"
            exit 1
          fi

          EXPECTED_REPO_URL="https://github.com/${GITHUB_REPOSITORY}"

          REPO_URL=$(jq -r '
            if .repository | type == "object" then .repository.url // ""
            elif .repository | type == "string" then .repository
            else ""
            end
          ' <<<"$PACKAGE_JSON")

          if [ -z "$REPO_URL" ]; then
            echo "::error::package.json is missing the \"repository\" field. npmjs.com provenance verification requires \"repository.url\" to match \"${EXPECTED_REPO_URL}\". Add to your package.json: \"repository\": { \"type\": \"git\", \"url\": \"${EXPECTED_REPO_URL}\" }"
            exit 1
          fi

          NORMALIZED_REPO_URL=$(echo "$REPO_URL" | sed -E 's|^git\+||; s|\.git$||')

          if [ "$NORMALIZED_REPO_URL" != "$EXPECTED_REPO_URL" ]; then
            echo "::error::package.json \"repository.url\" is \"${REPO_URL}\" (normalized: \"${NORMALIZED_REPO_URL}\"), but provenance expects \"${EXPECTED_REPO_URL}\". This will cause an E422 from npmjs.com. Fix the \"repository.url\" in your package.json."
            exit 1
          fi

          echo "Validated: repository.url matches expected provenance source."

          PACKAGE_FILENAME=$(basename "$PACKAGE_TARBALL")
          if ! PACKAGE_SHA512=$(openssl dgst -sha512 -binary "$PACKAGE_TARBALL" | base64 | tr -d '\n'); then
            echo "::error::Failed to compute sha512 for tarball: $PACKAGE_TARBALL"
            exit 1
          fi
          if [ -z "$PACKAGE_SHA512" ]; then
            echo "::error::Computed empty sha512 for tarball: $PACKAGE_TARBALL"
            exit 1
          fi
          PACKAGE_INTEGRITY="sha512-${PACKAGE_SHA512}"

          echo "Package: \"$PACKAGE_NAME\"@\"$PACKAGE_VERSION\""
          echo "Filename: \"$PACKAGE_FILENAME\""
          echo "Integrity: \"$PACKAGE_INTEGRITY\""

          EOF_MARKER=$(openssl rand -hex 16 2>/dev/null || python3 -c 'import uuid; print(uuid.uuid4().hex)' 2>/dev/null || echo "EOF_$(date +%s%N)_$$")
          if [ -z "$EOF_MARKER" ]; then
            echo "::error::Failed to generate a safe delimiter for GITHUB_OUTPUT."
            exit 1
          fi

          TARBALL_ABS=$(realpath "$PACKAGE_TARBALL")
          {
            echo "TARBALL_PATH<<${EOF_MARKER}"
            echo "$TARBALL_ABS"
            echo "${EOF_MARKER}"
            echo "PACKAGE_FILENAME<<${EOF_MARKER}"
            echo "$PACKAGE_FILENAME"
            echo "${EOF_MARKER}"
            echo "PACKAGE_NAME<<${EOF_MARKER}"
            echo "$PACKAGE_NAME"
            echo "${EOF_MARKER}"
            echo "PACKAGE_VERSION<<${EOF_MARKER}"
            echo "$PACKAGE_VERSION"
            echo "${EOF_MARKER}"
            echo "PACKAGE_INTEGRITY<<${EOF_MARKER}"
            echo "$PACKAGE_INTEGRITY"
            echo "${EOF_MARKER}"
          } >> "$GITHUB_OUTPUT"
      - name: Print all outputs of package details
        shell: bash
        run: |
          echo "TARBALL_PATH=${{ steps.package-details.outputs.TARBALL_PATH }}"
          echo "PACKAGE_FILENAME=${{ steps.package-details.outputs.PACKAGE_FILENAME }}"
          echo "PACKAGE_NAME=${{ steps.package-details.outputs.PACKAGE_NAME }}"
          echo "PACKAGE_VERSION=${{ steps.package-details.outputs.PACKAGE_VERSION }}"
          echo "PACKAGE_INTEGRITY=${{ steps.package-details.outputs.PACKAGE_INTEGRITY }}"
      - name: Generate the Predicate
        shell: bash
        env:
          BUILDER_ID: ${{ github.workflow_ref }} # Build is made on the same job
          CONFIG_SOURCE_URI: git+${{ github.event.repository.html_url }}@${{ github.ref }}
          CONFIG_SOURCE_DIGEST: ${{ github.sha }}
          GITHUB_ACTOR_ID: ${{ github.actor_id }}
          GITHUB_TRIGGERING_ACTOR_ID: ${{ github.triggering_actor }}
          GITHUB_REPOSITORY_ID: ${{ github.repository_id }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY_OWNER_ID: ${{ github.repository_owner_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}
          BUILD_INVOCATION_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: slsa-github-generator-nodejs-predicate.sh
      - name: Generate the SLSA layout
        shell: bash
        env:
          SLSA_OUTPUTS_ARTIFACTS_FILE: artifacts-layout.json
          PACKAGE_NAME: ${{ steps.package-details.outputs.PACKAGE_NAME }}
          PACKAGE_VERSION: ${{ steps.package-details.outputs.PACKAGE_VERSION }}
          PACKAGE_INTEGRITY: ${{ steps.package-details.outputs.PACKAGE_INTEGRITY }}
          PACKAGE_FILENAME: ${{ steps.package-details.outputs.PACKAGE_FILENAME }}
        run: slsa-github-generator-nodejs-layout.sh
      - name: Generate the attestation
        uses: slsa-framework/slsa-github-generator/.github/actions/generate-attestations@v2.0.0
        with:
          slsa-layout-file: artifacts-layout.json
          predicate-type: https://slsa.dev/provenance/v0.2
          predicate-file: predicate.json
          output-folder: attestations
      - name: Sign the attestation
        uses: slsa-framework/slsa-github-generator/.github/actions/sign-attestations@v2.0.0
        with:
          payload-type: application/vnd.in-toto+json
          attestations: attestations
          output-folder: attestations-signed 
      - name: Scan to find the attestation signed from the signed folder
        shell: bash
        id: scan-attestations-signed
        run: |
          set -euo pipefail

          shopt -s nullglob
          attestation_files=(./attestations-signed/*.build.slsa)
          shopt -u nullglob

          if [ "${#attestation_files[@]}" -eq 0 ]; then
            echo "::error::No signed attestation files found in ./attestations-signed."
            exit 1
          fi

          if [ "${#attestation_files[@]}" -gt 1 ]; then
            echo "::error::Expected exactly one signed attestation but found ${#attestation_files[@]}: ${attestation_files[*]}"
            exit 1
          fi

          ATTESTATION_SIGNED_PATH="${attestation_files[0]}"

          echo "ATTESTATION_SIGNED_PATH=${ATTESTATION_SIGNED_PATH}" >> "$GITHUB_OUTPUT"
      - name: Upload Attestation to the Github API
        uses: actions/github-script@v6
        env:
          ATTESTATION_PATH: ${{ steps.scan-attestations-signed.outputs.ATTESTATION_SIGNED_PATH }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          script: |
            const fs = require('fs');
            const attestationPath = process.env.ATTESTATION_PATH;
            const attestationContent = fs.readFileSync(attestationPath, 'utf8');
            const attestation = JSON.parse(attestationContent);
            const [owner, repoName] = process.env.GITHUB_REPOSITORY.split('/');

            const response = await github.request('POST /repos/{owner}/{repo}/attestations', {
              owner: owner,
              repo: repoName,
              headers: {
                'X-GitHub-Api-Version': '2022-11-28'
              },
              data: {
                bundle: attestation
              }
            });

            if (response.status !== 201) {
              throw new Error(`Failed to upload attestation to GitHub API. HTTP status code: ${response.status}`);
            }

            console.log('Attestation uploaded successfully:', response.data);
