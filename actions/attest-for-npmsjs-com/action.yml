name: "[Ledger Security] Attest a npm package for npmjs.com distribution"
description: ""
inputs:
  subject-path:
    description: 'Path to the npm package to attest.'
    required: true
  github_token:
    description: 'GitHub Token (to be able to upload the attestation to the GitHub Attestation API).'
    default: ${{ github.token }}
    required: true

runs:
  using: "composite"
  steps:
      - name: Check if repository is public (signature are leaking private information)
        if: ${{ github.event.repository.visibility != 'public' }}
        shell: bash
        run: |
          echo "::error This action only runs on public repositories. To avoid leaking private information, the action will be stopped."
          exit 1
      - name: Set GitHub Path
        run: echo "$GITHUB_ACTION_PATH" >> $GITHUB_PATH
        shell: bash
        env:
          GITHUB_ACTION_PATH: ${{ github.action_path }}
      - name: Auto-Detect - Package details
        id: package-details
        shell: bash
        run: |
          # Initialize a temporary file to accumulate JSON results from npm pack
          touch packages_accumulated.json

          process_file() {
            local file="$1"
            local json_output
            
            # Run 'npm pack' to generate the package tarball (if needed) and output metadata in JSON format.
            # We suppress stderr to silently skip invalid packages or files that are not valid npm packages,
            # allowing the action to proceed with only the valid ones found in the directory.
            if ! json_output=$(npm pack "$file" --json 2>/dev/null); then
               echo "Warning: Failed to pack $file. It might not be a valid npm package. Skipping."
               return
            fi

            # Validate that the output is valid JSON before adding it to our list.
            if echo "$json_output" | jq -e . >/dev/null 2>&1; then
               echo "$json_output" >> packages_accumulated.json
            else
               echo "Warning: Invalid JSON output from npm pack for $file. Skipping."
            fi
          }

          if [ -f "${{ inputs.subject-path }}" ]; then
            process_file "${{ inputs.subject-path }}"
          elif [ -d "${{ inputs.subject-path }}" ]; then
             # Use 'find' to safely handle directories with a large number of files or filenames containing spaces.
             # We process files sequentially to avoid "Argument list too long" errors that can occur with shell expansion.
             while IFS= read -r -d '' file; do
                process_file "$file"
             done < <(find "${{ inputs.subject-path }}" -maxdepth 1 -name "*.tgz" -print0)
          else
             echo "Error: subject-path '${{ inputs.subject-path }}' is not a valid file or directory."
             exit 1
          fi
          
          # Ensure at least one valid package was found and processed.
          if [ ! -s packages_accumulated.json ]; then
             echo "Error: No valid npm packages found to attest in ${{ inputs.subject-path }}"
             exit 1
          fi

          # specific case of npm pack who return a list of list of object.
          # We want a flat list of object.
          # Combine all individual JSON array entries into a single list.
          PACKAGES_LIST=$(jq -s 'add' packages_accumulated.json | jq -c '.')
          echo "PACKAGES_LIST=${PACKAGES_LIST}" >> $GITHUB_OUTPUT

      - name: Print all outputs of packges details
        shell: bash
        run: |
          echo "PACKAGES_LIST=${{ steps.package-details.outputs.PACKAGES_LIST }}"
      - name: Generate the Predicate
        shell: bash
        env:
          BUILDER_ID: ${{ github.workflow_ref }} # Buid is made on the same job
          CONFIG_SOURCE_URI: git+${{ github.event.repository.html_url }}@${{ github.ref }}
          CONFIG_SOURCE_DIGEST: ${{ github.sha }}
          GITHUB_ACTOR_ID: ${{ github.actor_id }}
          GITHUB_TRIGGERING_ACTOR_ID: ${{ github.triggering_actor }}
          GITHUB_REPOSITORY_ID: ${{ github.repository_id }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY_OWNER_ID: ${{ github.repository_owner_id}}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}
          BUILD_INVOCATION_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: slsa-github-generator-nodejs-predicate.sh
      - name: Generate the SLSA layout
        shell: bash
        env:
          SLSA_OUTPUTS_ARTIFACTS_FILE: artifacts-layout.json
          PACKAGES_LIST: ${{ steps.package-details.outputs.PACKAGES_LIST }}
        run: slsa-github-generator-nodejs-layout.sh
      - name: Generate the attestation
        uses: slsa-framework/slsa-github-generator/.github/actions/generate-attestations@v2.0.0
        with:
          slsa-layout-file: artifacts-layout.json
          predicate-type: https://slsa.dev/provenance/v0.2
          predicate-file: predicate.json
          output-folder: attestations
      - name: Sign the attestation
        uses: slsa-framework/slsa-github-generator/.github/actions/sign-attestations@v2.0.0
        with:
          payload-type: application/vnd.in-toto+json
          attestations: attestations
          output-folder: attestations-signed 
      - name: Scan to find the attestation signed from the signed folder
        shell: bash
        id: scan-attestations-signed
        run: |
          # Use 'find' instead of shell globbing to robustly handle large numbers of files 
          # and avoid "Argument list too long" errors.
          if find ./attestations-signed -maxdepth 1 -name "*.build.slsa" -print -quit | grep -q .; then
             ATTESTATION_FILES=$(find ./attestations-signed -maxdepth 1 -name "*.build.slsa")
          else
             echo "Error: No attestation signed files found in the ./attestations-signed directory."
             exit 1
          fi
          
          ATTESTATION_FILES_JSON=$(echo "$ATTESTATION_FILES" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "ATTESTATION_FILES_JSON=${ATTESTATION_FILES_JSON}" >> $GITHUB_OUTPUT
      - name: Upload Attestation to the Github API
        uses: actions/github-script@v6
        env:
          ATTESTATION_FILES_JSON: ${{ steps.scan-attestations-signed.outputs.ATTESTATION_FILES_JSON }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          script: |
            const fs = require('fs');
            const attestationFiles = JSON.parse(process.env.ATTESTATION_FILES_JSON);
            const [owner, repoName] = process.env.GITHUB_REPOSITORY.split('/');

            for (const attestationPath of attestationFiles) {
              console.log(`Uploading attestation from: ${attestationPath}`);
              const attestationContent = fs.readFileSync(attestationPath, 'utf8');
              const attestation = JSON.parse(attestationContent);

              try {
                const response = await github.request('POST /repos/{owner}/{repo}/attestations', {
                  owner: owner,
                  repo: repoName,
                  headers: {
                    'X-GitHub-Api-Version': '2022-11-28'
                  },
                  data: {
                    bundle: attestation
                  }
                });

                if (response.status !== 201) {
                  throw new Error(`Failed to upload attestation for ${attestationPath}. HTTP status code: ${response.status}`);
                }
                console.log(`Attestation uploaded successfully for ${attestationPath}:`, response.data);
              } catch (error) {
                console.error(`Error uploading attestation for ${attestationPath}:`, error);
                process.exit(1);
              }
            }
