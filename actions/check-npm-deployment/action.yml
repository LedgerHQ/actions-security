name: "[Ledger Security] Check npm deployment status"
description: "Check if an npm package was successfully deployed. Wrapper around check-deployment with package-type=npm."

inputs:
  tarball-path:
    description: "Path to the npm tarball (.tgz file)"
    required: true
  timeout:
    description: "Maximum seconds to wait for deployment result (max 600)"
    required: false
    default: "300"
  poll-interval:
    description: "Seconds between status checks"
    required: false
    default: "15"

outputs:
  status:
    description: "Deployment status: success, failed, or timed_out"
    value: ${{ steps.delegate.outputs.status }}
  error-message:
    description: "Error message if deployment failed or timed out"
    value: ${{ steps.delegate.outputs.error-message }}

runs:
  using: "composite"
  steps:
    - name: Delegate to check-deployment
      id: delegate
      uses: LedgerHQ/actions-security/actions/check-deployment@xchalle/fix-check-npm-deployment
      with:
        package-type: npm
        tarball-path: ${{ inputs.tarball-path }}
        timeout: ${{ inputs.timeout }}
        poll-interval: ${{ inputs.poll-interval }}
